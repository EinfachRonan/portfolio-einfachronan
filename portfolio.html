<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Kategorisiertes Portfolio von EinfachRonan mit Portraits, Hochzeiten, Club, Autos und Tieren."
    />
    <title>Portfolio | EinfachRonan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="assets/logo-einfachronan.png" />
    <link rel="stylesheet" href="styles.css?v=flat-tiles-2" />
  </head>
  <body class="portfolio-page">
    <header class="site-header" data-header>
      <a class="brand" href="index.html#start" aria-label="EinfachRonan Startseite">
        <img class="brand-logo" decoding="async" src="assets/logo-einfachronan.png" alt="EinfachRonan" />
      </a>

      <button class="menu-toggle" type="button" aria-label="Navigation öffnen" aria-expanded="false" data-menu-toggle>
        <span></span>
        <span></span>
      </button>

      <nav class="nav" data-nav aria-label="Hauptnavigation">
        <a class="nav-pill nav-icon-link" href="https://www.instagram.com/einfach.ronan/" target="_blank" rel="noreferrer" aria-label="@einfach.ronan">
          <svg class="instagram-icon" viewBox="0 0 24 24" aria-hidden="true">
            <rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
            <path d="M17.5 6.5h.01"></path>
          </svg>
          <span>@einfach.ronan</span>
        </a>
      </nav>
    </header>

    <main id="portfolio">
      <section class="portfolio-hero portfolio-hero-feature" aria-labelledby="portfolio-title">
        <div class="portfolio-hero-copy">
          <p class="kicker">EinfachRonan</p>
          <h1 id="portfolio-title" data-portfolio-title>Portrait</h1>
          <p data-portfolio-copy>Ruhige Portraits, klare Ausschnitte und echtes Licht.</p>
        </div>
        <figure class="portfolio-hero-image">
          <img data-portfolio-hero-image loading="eager" fetchpriority="high" decoding="async" src="assets/photos/portrait-city-smile.webp" alt="Lächelndes Portrait auf einer Straße" />
        </figure>
      </section>

      <section class="filter-bar" aria-label="Galerie Filter">
        <button class="filter" type="button" data-filter="club">Club</button>
        <button class="filter is-active" type="button" data-filter="portrait">Portrait</button>
        <button class="filter" type="button" data-filter="wedding">Hochzeit</button>
        <button class="filter" type="button" data-filter="auto">Auto</button>
        <button class="filter" type="button" data-filter="animal">Tiere</button>
      </section>

      <section class="gallery" aria-label="Portfolio Galerie">
        <article class="photo-tile" data-category="club">
          <button type="button" data-lightbox="0">
            <img loading="eager" fetchpriority="high" src="assets/photos/club-dj-profile-dark.webp" alt="DJ im dunklen Raum" />
          </button>
        </article>
        <article class="photo-tile" data-category="club">
          <button type="button" data-lightbox="1">
            <img loading="eager" fetchpriority="high" src="assets/photos/club-dj-red-light.webp" alt="DJ am Mischpult mit rotem Licht" />
          </button>
        </article>
        <article class="photo-tile" data-category="club">
          <button type="button" data-lightbox="2">
            <img loading="eager" fetchpriority="high" src="assets/photos/club-dj-console.webp" alt="DJ am Mischpult" />
          </button>
        </article>
        <article class="photo-tile" data-category="auto">
          <button type="button" data-lightbox="3">
            <img decoding="async" src="assets/photos/automotive-audi-night.webp" alt="Audi bei Nacht unter Tankstellenlicht" />
          </button>
        </article>
        <article class="photo-tile" data-category="portrait">
          <button type="button" data-lightbox="4">
            <img decoding="async" src="assets/photos/portrait-point-night.webp" alt="Portrait eines Mannes vor dunkler Wand" />
          </button>
        </article>
        <article class="photo-tile" data-category="portrait">
          <button type="button" data-lightbox="5">
            <img decoding="async" src="assets/photos/portrait-white-shirt-outdoor.webp" alt="Portrait draußen am Wasser" />
          </button>
        </article>
        <article class="photo-tile" data-category="portrait">
          <button type="button" data-lightbox="6">
            <img decoding="async" src="assets/photos/portrait-window-stripes.webp" alt="Mann mit gestreiftem Hemd vor hellem Fenster" />
          </button>
        </article>
        <article class="photo-tile" data-category="portrait">
          <button type="button" data-lightbox="7">
            <img decoding="async" src="assets/photos/portrait-studio-beanie.webp" alt="Studio Portrait mit Mütze und Mikrofon" />
          </button>
        </article>
        <article class="photo-tile" data-category="portrait">
          <button type="button" data-lightbox="8">
            <img decoding="async" src="assets/photos/portrait-blue-jacket-glasses.jpg" alt="Portrait mit Brille und blauer Jacke im warmen Licht" />
          </button>
        </article>
        <article class="photo-tile" data-category="animal">
          <button type="button" data-lightbox="9">
            <img decoding="async" src="assets/photos/animal-dog-grass.webp" alt="Schwarzer Hund auf einer Wiese" />
          </button>
        </article>
        <article class="photo-tile" data-category="portrait">
          <button type="button" data-lightbox="10">
            <img decoding="async" src="assets/photos/portrait-riverside-profile.webp" alt="Profilportrait im Sonnenlicht am Wasser" />
          </button>
        </article>
        <article class="photo-tile" data-category="wedding">
          <button type="button" data-lightbox="11">
            <img decoding="async" src="assets/photos/wedding-blue-bouquet.webp" alt="Hände mit Eheringen auf blauweißem Brautstrauß" />
          </button>
        </article>
        <article class="photo-tile" data-category="wedding">
          <button type="button" data-lightbox="12">
            <img decoding="async" src="assets/photos/wedding-guest-toast.webp" alt="Gast mit Glas und Flasche bei einer Hochzeit" />
          </button>
        </article>
        <article class="photo-tile" data-category="wedding">
          <button type="button" data-lightbox="13">
            <img decoding="async" src="assets/photos/wedding-table-flowers.webp" alt="Blumenschmuck auf Hochzeitstisch" />
          </button>
        </article>
        <article class="photo-tile" data-category="wedding">
          <button type="button" data-lightbox="14">
            <img decoding="async" src="assets/photos/wedding-table-detail.webp" alt="Blumen und Gläser auf Hochzeitstisch" />
          </button>
        </article>
        <article class="photo-tile" data-category="animal">
          <button type="button" data-lightbox="15">
            <img decoding="async" src="assets/photos/animal-cats-window.webp" alt="Zwei Katzen auf einem Fensterplatz" />
          </button>
        </article>
        <article class="photo-tile" data-category="animal">
          <button type="button" data-lightbox="16">
            <img decoding="async" src="assets/photos/animal-cat-close.webp" alt="Katze leckt ihre Pfote" />
          </button>
        </article>
        <article class="photo-tile" data-category="portrait">
          <button type="button" data-lightbox="17">
            <img decoding="async" src="assets/photos/portrait-cap-outdoor.webp" alt="Portrait eines Mannes mit weißer Cap" />
          </button>
        </article>
        <article class="photo-tile" data-category="portrait">
          <button type="button" data-lightbox="18">
            <img decoding="async" src="assets/photos/portrait-redhair-sun.webp" alt="Rothaarige Frau im Sonnenlicht" />
          </button>
        </article>
        <article class="photo-tile" data-category="wedding">
          <button type="button" data-lightbox="19">
            <img decoding="async" src="assets/photos/wedding-red-bouquet.webp" alt="Eheringe über rotem und blauem Brautstrauß" />
          </button>
        </article>
        <article class="photo-tile" data-category="portrait">
          <button type="button" data-lightbox="20">
            <img decoding="async" src="assets/photos/portrait-night-arcade.webp" alt="Nachtportrait vor beleuchtetem Gebäude" />
          </button>
        </article>
        <article class="photo-tile" data-category="portrait">
          <button type="button" data-lightbox="21">
            <img decoding="async" src="assets/photos/portrait-urban-walk.webp" alt="Person mit Blazer in der Stadt" />
          </button>
        </article>
        <article class="photo-tile" data-category="portrait">
          <button type="button" data-lightbox="22">
            <img decoding="async" src="assets/photos/portrait-city-smile.webp" alt="Lächelndes Portrait auf einer Straße" />
          </button>
        </article>
        <article class="photo-tile" data-category="portrait">
          <button type="button" data-lightbox="23">
            <img decoding="async" src="assets/photos/portrait-leather-jacket-snow.webp" alt="Portrait mit schwarzer Jacke im Schnee" />
          </button>
        </article>
      </section>
    </main>

    <div class="lightbox" data-lightbox-modal aria-hidden="true">
      <button class="lightbox-close" type="button" aria-label="Bildansicht schließen" data-lightbox-close>Schließen</button>
      <button class="lightbox-nav lightbox-prev" type="button" aria-label="Vorheriges Bild" data-lightbox-prev>Zurück</button>
      <figure>
        <img decoding="async" src="assets/photos/portrait-city-smile.webp" alt="" data-lightbox-image />
        <figcaption data-lightbox-caption></figcaption>
      </figure>
      <button class="lightbox-nav lightbox-next" type="button" aria-label="Nächstes Bild" data-lightbox-next>Weiter</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
