<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Kategorisiertes Fotografie Portfolio von EinfachRonan."
    />
    <title>Portfolio | EinfachRonan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="assets/logo-einfachronan.png" />
    <link rel="stylesheet" href="styles.css?v=cinematic-premium-2" />
  </head>
  <body class="portfolio-page">
    <header class="site-header" data-header>
      <a class="brand" href="index.html" aria-label="EinfachRonan Startseite">
        <img class="brand-logo" decoding="async" src="assets/logo-einfachronan.png" alt="EinfachRonan" />
      </a>

      <nav class="nav" aria-label="Hauptnavigation">
        <a class="nav-link is-active" href="portfolio.html?filter=portrait" aria-current="page">Portfolio</a>
        <a class="nav-link" href="index.html#kontakt">Kontakt</a>
        <a class="instagram-link" href="https://www.instagram.com/einfach.ronan/" target="_blank" rel="noreferrer">
          <svg class="instagram-icon" viewBox="0 0 24 24" aria-hidden="true">
            <rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
            <path d="M17.5 6.5h.01"></path>
          </svg>
          <span>@einfach.ronan</span>
        </a>
      </nav>
    </header>

    <main>
      <section class="portfolio-hero reveal" data-portfolio-hero>
        <div class="portfolio-hero-copy">
          <h1 data-portfolio-title>Portrait</h1>
          <p data-portfolio-copy>Ruhige Portraits, klares Licht und nat&uuml;rliche Momente.</p>
        </div>
        <figure class="portfolio-hero-image" data-parallax-media>
          <img
            data-portfolio-hero-image
            loading="eager"
            fetchpriority="high"
            decoding="async"
            src="assets/photos/portrait-city-smile.webp"
            alt="Portrait in der Stadt"
          />
        </figure>
      </section>

      <section class="filter-bar reveal" aria-label="Portfolio Kategorien">
        <button class="filter is-active" type="button" data-filter="portrait">Portrait</button>
        <button class="filter" type="button" data-filter="wedding">Hochzeit</button>
        <button class="filter" type="button" data-filter="club">Club</button>
        <button class="filter" type="button" data-filter="auto">Autos</button>
        <button class="filter" type="button" data-filter="animal">Tiere</button>
      </section>

      <section class="gallery" aria-label="Portfolio Galerie">
        <article class="photo-tile reveal" data-category="portrait">
          <button type="button" data-lightbox>
            <img loading="eager" decoding="async" src="assets/photos/portrait-city-smile.webp" alt="Portrait in der Stadt" />
          </button>
        </article>
        <article class="photo-tile reveal" data-category="portrait">
          <button type="button" data-lightbox>
            <img loading="lazy" decoding="async" src="assets/photos/portrait-redhair-sun.webp" alt="Rothaarige Frau im Sonnenlicht" />
          </button>
        </article>
        <article class="photo-tile reveal" data-category="portrait">
          <button type="button" data-lightbox>
            <img loading="lazy" decoding="async" src="assets/photos/portrait-riverside-profile.webp" alt="Profilportrait am Wasser" />
          </button>
        </article>
        <article class="photo-tile reveal" data-category="portrait">
          <button type="button" data-lightbox>
            <img loading="lazy" decoding="async" src="assets/photos/portrait-white-shirt-outdoor.webp" alt="Portrait drau&szlig;en am Wasser" />
          </button>
        </article>
        <article class="photo-tile reveal" data-category="portrait">
          <button type="button" data-lightbox>
            <img loading="lazy" decoding="async" src="assets/photos/portrait-window-stripes.webp" alt="Portrait vor hellem Fenster" />
          </button>
        </article>
        <article class="photo-tile reveal" data-category="portrait">
          <button type="button" data-lightbox>
            <img loading="lazy" decoding="async" src="assets/photos/portrait-studio-beanie.webp" alt="Studio Portrait mit M&uuml;tze" />
          </button>
        </article>
        <article class="photo-tile reveal" data-category="portrait">
          <button type="button" data-lightbox>
            <img loading="lazy" decoding="async" src="assets/photos/portrait-blue-jacket-glasses.jpg" alt="Portrait mit Brille" />
          </button>
        </article>
        <article class="photo-tile reveal" data-category="portrait">
          <button type="button" data-lightbox>
            <img loading="lazy" decoding="async" src="assets/photos/portrait-cap-outdoor.webp" alt="Portrait mit wei&szlig;er Cap" />
          </button>
        </article>
        <article class="photo-tile reveal" data-category="portrait">
          <button type="button" data-lightbox>
            <img loading="lazy" decoding="async" src="assets/photos/portrait-night-arcade.webp" alt="Nachtportrait" />
          </button>
        </article>
        <article class="photo-tile reveal" data-category="portrait">
          <button type="button" data-lightbox>
            <img loading="lazy" decoding="async" src="assets/photos/portrait-urban-walk.webp" alt="Portrait in der Stadt" />
          </button>
        </article>
        <article class="photo-tile reveal" data-category="portrait">
          <button type="button" data-lightbox>
            <img loading="lazy" decoding="async" src="assets/photos/portrait-point-night.webp" alt="Portrait bei Nacht" />
          </button>
        </article>
        <article class="photo-tile reveal" data-category="portrait">
          <button type="button" data-lightbox>
            <img loading="lazy" decoding="async" src="assets/photos/portrait-leather-jacket-snow.webp" alt="Portrait im Schnee" />
          </button>
        </article>

        <article class="photo-tile reveal" data-category="wedding">
          <button type="button" data-lightbox>
            <img loading="lazy" decoding="async" src="assets/photos/wedding-blue-bouquet.webp" alt="H&auml;nde mit Eheringen auf Brautstrau&szlig;" />
          </button>
        </article>
        <article class="photo-tile reveal" data-category="wedding">
          <button type="button" data-lightbox>
            <img loading="lazy" decoding="async" src="assets/photos/wedding-red-bouquet.webp" alt="Hochzeitsringe und Brautstrau&szlig;" />
          </button>
        </article>
        <article class="photo-tile reveal" data-category="wedding">
          <button type="button" data-lightbox>
            <img loading="lazy" decoding="async" src="assets/photos/wedding-guest-toast.webp" alt="Hochzeitsgast mit Glas" />
          </button>
        </article>
        <article class="photo-tile reveal" data-category="wedding">
          <button type="button" data-lightbox>
            <img loading="lazy" decoding="async" src="assets/photos/wedding-table-flowers.webp" alt="Blumen auf Hochzeitstisch" />
          </button>
        </article>
        <article class="photo-tile reveal" data-category="wedding">
          <button type="button" data-lightbox>
            <img loading="lazy" decoding="async" src="assets/photos/wedding-table-detail.webp" alt="Details auf Hochzeitstisch" />
          </button>
        </article>

        <article class="photo-tile reveal" data-category="club">
          <button type="button" data-lightbox>
            <img loading="lazy" decoding="async" src="assets/photos/club-dj-profile-dark.webp" alt="DJ im dunklen Raum" />
          </button>
        </article>
        <article class="photo-tile reveal" data-category="club">
          <button type="button" data-lightbox>
            <img loading="lazy" decoding="async" src="assets/photos/club-dj-red-light.webp" alt="DJ am Mischpult mit rotem Licht" />
          </button>
        </article>
        <article class="photo-tile reveal" data-category="club">
          <button type="button" data-lightbox>
            <img loading="lazy" decoding="async" src="assets/photos/club-dj-console.webp" alt="DJ am Mischpult" />
          </button>
        </article>

        <article class="photo-tile reveal" data-category="auto">
          <button type="button" data-lightbox>
            <img loading="lazy" decoding="async" src="assets/photos/automotive-audi-night.webp" alt="Audi bei Nacht" />
          </button>
        </article>

        <article class="photo-tile reveal" data-category="animal">
          <button type="button" data-lightbox>
            <img loading="lazy" decoding="async" src="assets/photos/animal-cats-window.webp" alt="Zwei Katzen am Fenster" />
          </button>
        </article>
        <article class="photo-tile reveal" data-category="animal">
          <button type="button" data-lightbox>
            <img loading="lazy" decoding="async" src="assets/photos/animal-cat-close.webp" alt="Katze leckt ihre Pfote" />
          </button>
        </article>
        <article class="photo-tile reveal" data-category="animal">
          <button type="button" data-lightbox>
            <img loading="lazy" decoding="async" src="assets/photos/animal-dog-grass.webp" alt="Hund auf einer Wiese" />
          </button>
        </article>
      </section>
    </main>

    <div class="lightbox" data-lightbox-modal aria-hidden="true">
      <button class="lightbox-close" type="button" aria-label="Bildansicht schlie&szlig;en" data-lightbox-close>
        Schlie&szlig;en
      </button>
      <button class="lightbox-nav lightbox-prev" type="button" aria-label="Vorheriges Bild" data-lightbox-prev>
        Zur&uuml;ck
      </button>
      <figure>
        <img decoding="async" src="assets/photos/portrait-city-smile.webp" alt="" data-lightbox-image />
      </figure>
      <button class="lightbox-nav lightbox-next" type="button" aria-label="N&auml;chstes Bild" data-lightbox-next>
        Weiter
      </button>
    </div>

    <script src="script.js?v=cinematic-premium-2"></script>
  </body>
</html>
