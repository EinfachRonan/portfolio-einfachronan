<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="EinfachRonan Fotografie Portfolio für Portraits, Hochzeiten, Club, Autos und Tiere."
    />
    <title>EinfachRonan | Fotografie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="assets/logo-einfachronan.png" />
    <link rel="stylesheet" href="styles.css?v=flat-tiles-2" />
  </head>
  <body class="home-page">
    <header class="site-header" data-header>
      <a class="brand" href="index.html#start" aria-label="EinfachRonan Startseite">
        <img class="brand-logo" decoding="async" src="assets/logo-einfachronan.png" alt="EinfachRonan" />
      </a>

      <button class="menu-toggle" type="button" aria-label="Navigation öffnen" aria-expanded="false" data-menu-toggle>
        <span></span>
        <span></span>
      </button>

      <nav class="nav" data-nav aria-label="Hauptnavigation">
        <a href="portfolio.html">Portfolio</a>
        <a href="#kontakt">Kontakt</a>
        <a class="nav-pill nav-icon-link" href="https://www.instagram.com/einfach.ronan/" target="_blank" rel="noreferrer" aria-label="@einfach.ronan">
          <svg class="instagram-icon" viewBox="0 0 24 24" aria-hidden="true">
            <rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
            <path d="M17.5 6.5h.01"></path>
          </svg>
          <span>@einfach.ronan</span>
        </a>
      </nav>
    </header>

    <main id="start">
      <section class="home-categories" aria-label="Fotografie Kategorien">
        <a class="home-category home-category-wide" href="portfolio.html?filter=portrait#portfolio">
          <span>Portrait</span>
          <div class="home-category-images">
            <img loading="eager" fetchpriority="high" decoding="async" src="assets/photos/portrait-city-smile.webp" alt="Lächelndes Portrait auf einer Straße" />
            <img loading="eager" decoding="async" src="assets/photos/portrait-blue-jacket-glasses.jpg" alt="Portrait mit Brille und blauer Jacke im warmen Licht" />
          </div>
        </a>

        <a class="home-category" href="portfolio.html?filter=wedding#portfolio">
          <span>Hochzeit</span>
          <div class="home-category-images">
            <img loading="eager" decoding="async" src="assets/photos/wedding-blue-bouquet.webp" alt="Hände mit Eheringen auf blauweißem Brautstrauß" />
            <img loading="lazy" decoding="async" src="assets/photos/wedding-red-bouquet.webp" alt="Eheringe über rotem und blauem Brautstrauß" />
          </div>
        </a>

        <a class="home-category" href="portfolio.html?filter=club#portfolio">
          <span>Club</span>
          <div class="home-category-images">
            <img loading="eager" decoding="async" src="assets/photos/club-dj-console.webp" alt="DJ am Mischpult" />
            <img loading="lazy" decoding="async" src="assets/photos/club-dj-profile-dark.webp" alt="DJ im dunklen Raum" />
          </div>
        </a>

        <a class="home-category" href="portfolio.html?filter=auto#portfolio">
          <span>Autos</span>
          <div class="home-category-images home-category-images-single">
            <img loading="eager" decoding="async" src="assets/photos/automotive-audi-night.webp" alt="Audi bei Nacht unter Tankstellenlicht" />
          </div>
        </a>

        <a class="home-category" href="portfolio.html?filter=animal#portfolio">
          <span>Tiere</span>
          <div class="home-category-images">
            <img loading="eager" decoding="async" src="assets/photos/animal-cats-window.webp" alt="Zwei Katzen auf einem Fensterplatz" />
            <img loading="lazy" decoding="async" src="assets/photos/animal-dog-grass.webp" alt="Schwarzer Hund auf einer Wiese" />
          </div>
        </a>
      </section>

      <section class="contact" id="kontakt">
        <div>
          <img class="contact-logo" loading="lazy" decoding="async" src="assets/logo-einfachronan.png" alt="EinfachRonan Logo" />
          <p class="section-kicker">Kontakt</p>
          <h2>Kontakt</h2>
        </div>
        <a class="instagram-button" href="https://www.instagram.com/einfach.ronan/" target="_blank" rel="noreferrer">
          <svg class="instagram-icon" viewBox="0 0 24 24" aria-hidden="true">
            <rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
            <path d="M17.5 6.5h.01"></path>
          </svg>
          <span>
            <strong>@einfach.ronan</strong>
          </span>
        </a>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
